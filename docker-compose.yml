services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seoulcenter-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=seoulcenter
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - SERVER_NAME=:8000
      - FRANKENPHP_CONFIG="worker public/index.php"
    command: frankenphp php-server --listen :8000 --root public/
    networks:
      - seoulcenter-network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: seoulcenter-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: seoulcenter
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - seoulcenter-db-data:/var/lib/mysql
    networks:
      - seoulcenter-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  seoulcenter-network:
    driver: bridge

volumes:
  seoulcenter-db-data:
